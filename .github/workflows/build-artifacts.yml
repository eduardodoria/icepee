name: Build Artifacts

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  APP_NAME: IcePee
  DORIAX_REPO_OWNER: doriaxengine
  DORIAX_REPO_NAME: doriax
  DORIAX_WORKFLOW_FILE: cmake.yml
  DORIAX_REF: main
  EXPORT_DIR: .ci-build/export
  BUILD_DIR: .ci-build/build
  PACKAGE_DIR: .ci-build/package

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            doriax_artifact: ubuntu_gcc
          - os: windows-latest
            platform: windows
            doriax_artifact: windows_msvc
          - os: macos-latest
            platform: macos
            doriax_artifact: macos_clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgl1-mesa-dev libglfw3-dev

      - name: Download Doriax editor
        id: editor
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DORIAX_EDITOR_ARTIFACT: ${{ matrix.doriax_artifact }}
        run: |
          rm -rf .ci-tools .ci-build
          mkdir -p .ci-tools
          python - <<'PY'
          import json
          import os
          import shutil
          import stat
          import urllib.request
          import zipfile
          from pathlib import Path

          owner = os.environ['DORIAX_REPO_OWNER']
          repo = os.environ['DORIAX_REPO_NAME']
          workflow = os.environ['DORIAX_WORKFLOW_FILE']
          ref = os.environ['DORIAX_REF']
          artifact_name = os.environ['DORIAX_EDITOR_ARTIFACT']
          token = os.environ.get('GITHUB_TOKEN', '')

          api_headers = {
              'Accept': 'application/vnd.github+json',
              'User-Agent': 'icepee-build-artifacts',
          }
          if token:
              api_headers['Authorization'] = f'Bearer {token}'

          def get_json(url: str):
              request = urllib.request.Request(url, headers=api_headers)
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          def download_file(url: str, destination: Path):
              request = urllib.request.Request(
                  url,
                  headers={'User-Agent': api_headers['User-Agent']},
              )
              with urllib.request.urlopen(request) as response, destination.open('wb') as output:
                  shutil.copyfileobj(response, output)

          def get_successful_run():
              commit = get_json(
                  f'https://api.github.com/repos/{owner}/{repo}/commits/{ref}'
              )
              runs = get_json(
                  f'https://api.github.com/repos/{owner}/{repo}/actions/workflows/{workflow}/runs?head_sha={commit["sha"]}&per_page=100'
              ).get('workflow_runs', [])

              run = next((item for item in runs if item.get('conclusion') == 'success'), None)
              if run is not None:
                  return run

              runs = get_json(
                  f'https://api.github.com/repos/{owner}/{repo}/actions/workflows/{workflow}/runs?branch={ref}&status=completed&per_page=100'
              ).get('workflow_runs', [])
              run = next((item for item in runs if item.get('conclusion') == 'success'), None)
              if run is None:
                  raise SystemExit(
                      f'Could not find a successful {workflow} workflow run for {owner}/{repo} at ref {ref}'
                  )
              return run

          run = get_successful_run()
          artifacts = get_json(run['artifacts_url']).get('artifacts', [])
          artifact = next(
              (
                  item
                  for item in artifacts
                  if item.get('name') == artifact_name and not item.get('expired')
              ),
              None,
          )
          if artifact is None:
              available = ', '.join(item.get('name', '<unknown>') for item in artifacts) or '<none>'
              raise SystemExit(
                  f'Could not find artifact {artifact_name} for workflow run {run.get("html_url", run["url"])}. Available artifacts: {available}'
              )

          editor_dir = Path('.ci-tools') / 'doriax-editor' / artifact_name
          if editor_dir.exists():
              shutil.rmtree(editor_dir)
          editor_dir.mkdir(parents=True)

          archive_path = editor_dir / f'{artifact_name}.zip'
          download_url = f'https://nightly.link/{owner}/{repo}/actions/artifacts/{artifact["id"]}.zip'
          print(f'Downloading {download_url}', flush=True)
          download_file(download_url, archive_path)

          with zipfile.ZipFile(archive_path) as archive:
              archive.extractall(editor_dir)

          archive_path.unlink()

          editor_path = None
          for candidate in ('doriax-editor-cmd.exe', 'doriax-editor.exe', 'doriax-editor'):
              matches = sorted(editor_dir.rglob(candidate))
              if matches:
                  editor_path = matches[0]
                  break

          if editor_path is None:
              raise SystemExit(f'Artifact {artifact_name} does not contain a Doriax editor executable')

          if os.name != 'nt':
              editor_path.chmod(stat.S_IMODE(editor_path.stat().st_mode) | stat.S_IXUSR)

          with Path(os.environ['GITHUB_OUTPUT']).open('a') as output:
              print(f'editor_path={editor_path.as_posix()}', file=output)
              print(f'workflow_run_url={run.get("html_url", "")}', file=output)
          PY

      - name: Export project
        env:
          EDITOR_PATH: ${{ steps.editor.outputs.editor_path }}
        run: |
          mkdir -p .ci-build
          "$EDITOR_PATH" export \
            --project . \
            --out "$EXPORT_DIR" \
            --platform "${{ matrix.platform }}" \
            --shader mesh:Uv1,Puc,Shw,Pcf,Nor,Vc4 \
            --shader mesh:Uv1,Puc,Shw,Pcf,Nor,Nmp \
            --shader depth \
            --shader ui:Vc4 \
            --shader ui:Tex,Vc4 \
            --shader ui:Ftx \
            --shader points:Tex,Vc4

      - name: Configure
        run: |
          cmake \
            -S "$EXPORT_DIR" \
            -B "$BUILD_DIR" \
            -DCMAKE_BUILD_TYPE=Release \
            -DAPP_NAME="$APP_NAME"

      - name: Build
        run: |
          cmake --build "$BUILD_DIR" --config Release --parallel

      - name: Install
        run: |
          cmake --install "$BUILD_DIR" --config Release --prefix "$PACKAGE_DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}
          path: .ci-build/package/bin
          if-no-files-found: error
          retention-days: 14